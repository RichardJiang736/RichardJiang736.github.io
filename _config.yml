# Jekyll configuration for clean URLs
permalink: pretty

# Plugins
plugins:
  - jekyll-redirect-from

# Build settings
markdown: kramdown
highlighter: rouge

# Site settings
title: Richard Jiang
description: What I think. Writing, projects, and art.
url: "https://richardjiang.me"
baseurl: ""

# Exclude files from processing
exclude:
  - README.md
  - .gitignore
  - Gemfile
  - Gemfile.lock

# Include dotfiles
include:
  - .htaccess